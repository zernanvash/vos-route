name: vosroute
description: "Fleet Dispatch Mobile App for VOS SCM"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  sqflite: ^2.4.1
  path: ^1.9.1
  path_provider: ^2.1.6
  provider: ^6.1.2
  maplibre_gl: ^0.26.0
  image_picker: ^1.1.2
  signature: ^5.5.0
  geolocator: ^13.0.2
  flutter_background_service: ^5.0.6
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.1
  shared_preferences: ^2.3.4
  connectivity_plus: ^6.1.2
  intl: ^0.20.2
  flutter_local_notifications: ^18.0.1
  url_launcher: ^6.3.2
  fl_chart: ^0.70.2
  flutter_secure_storage: ^9.2.4
  jwt_decoder: ^2.0.1
  timezone: ^0.10.1
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.20

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  drift_dev: ^2.14.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/app_icon.png
    - assets/images/app_icon.jpg

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true
