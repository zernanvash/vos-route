<style>
        .glass-card {
            background: rgba(31, 31, 40, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .emergency-glow {
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
        }
        @keyframes pulse-emergency {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pulse-warning {
            animation: pulse-emergency 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .sos-button-gradient {
            background: linear-gradient(135deg, #EF4444 0%, #991B1B 100%);
        }
        body {
            background-color: #080810;
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="text-on-surface font-body-md min-h-screen pb-32">
<!-- Top Navigation Anchor (As specified in JSON) -->
<header class="bg-background/80 backdrop-blur-md dark:bg-background/80 docked full-width top-0 z-50 sticky border-b border-border-muted flex justify-between items-center w-full px-lg py-md">
<div class="flex items-center gap-md">
<button class="material-symbols-outlined text-primary transition-all duration-200 active:scale-95" data-icon="arrow_back">arrow_back</button>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">Emergency SOS</h1>
</div>
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="sensors">sensors</span>
</div>
</header>
<main class="px-md mt-lg space-y-lg max-w-2xl mx-auto">
<!-- Warning Card -->
<div class="glass-card rounded-xl p-md border-l-4 border-error overflow-hidden relative group">
<div class="absolute inset-0 bg-error/5 group-hover:bg-error/10 transition-colors"></div>
<div class="relative flex items-start gap-md">
<div class="bg-error/20 p-xs rounded-lg animate-pulse-warning">
<span class="material-symbols-outlined text-error" data-icon="warning" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<div>
<p class="text-error font-title-md font-bold text-[14px]">Use this only for genuine emergencies.</p>
<p class="text-error/80 text-[12px] mt-xxs">This will alert the dispatcher and nearby units immediately with your precise GPS coordinates.</p>
</div>
</div>
</div>
<!-- Form Sections -->
<div class="space-y-md">
<!-- Incident Type -->
<div class="space-y-xs">
<label class="font-label-sm text-text-secondary px-xxs">Incident Type</label>
<div class="relative">
<select class="w-full bg-surface-container border border-border-muted rounded-xl px-md py-sm appearance-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-text-primary">
<option>Accident</option>
<option>Medical Emergency</option>
<option>Vehicle Theft</option>
<option>Cargo Breach</option>
<option>Other</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-text-secondary" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Severity -->
<div class="space-y-xs">
<label class="font-label-sm text-text-secondary px-xxs">Severity</label>
<div class="relative">
<select class="w-full bg-surface-container border border-border-muted rounded-xl px-md py-sm appearance-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-text-primary">
<option>High</option>
<option>Critical</option>
<option>Medium</option>
<option>Low</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-text-secondary" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Situation Description -->
<div class="space-y-xs">
<label class="font-label-sm text-text-secondary px-xxs">Describe the situation...</label>
<textarea class="w-full glass-card border border-border-muted rounded-xl px-md py-md focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-text-primary resize-none placeholder:text-text-tertiary" placeholder="Provide details about the incident, injuries, or immediate needs..." rows="4"></textarea>
</div>
<!-- Optional Contacts -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div class="space-y-xs">
<label class="font-label-sm text-text-secondary px-xxs">Contact person (optional)</label>
<input class="w-full bg-surface-container border border-border-muted rounded-xl px-md py-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-text-primary" placeholder="Name" type="text"/>
</div>
<div class="space-y-xs">
<label class="font-label-sm text-text-secondary px-xxs">Contact phone (optional)</label>
<input class="w-full bg-surface-container border border-border-muted rounded-xl px-md py-sm focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-text-primary" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
</div>
<!-- Location Metadata -->
<div class="flex items-center gap-xs text-text-tertiary pt-sm pb-md">
<span class="material-symbols-outlined text-[16px]" data-icon="location_on">location_on</span>
<span class="font-label-sm">Location: 16.08243, 120.36077 (High Accuracy)</span>
</div>
<!-- Map Preview Card -->
<div class="relative w-full h-40 rounded-xl overflow-hidden border border-border-muted shadow-lg">
<div class="w-full h-full bg-cover bg-center" data-alt="A high-tech satellite map view of a city intersection at night, featuring glowing neon blue traffic lines and a single bright red blinking location marker. The aesthetic is dark and technical with deep blacks and vibrant primary colors, matching a high-performance fleet management dashboard interface." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCcSB2X1SCjImeQTPH0vQVxRNh5LThHDRxk7IEVwN7uL8tqJQM6o6z6garGoRBa7mF8_2gOdjYPoPpJEAJt-rRhi7sMm_nJwk_AyushVIE82mnpuszkPI9XHjwSz0ZieJS-FY2-BM51kgK-nW2Y53n24CfuhO4IA3_PVHAx7u72DhI29iLpsggwsjfnulbEeidRhS_x0NGzbB0rmAtv-v8O5UpbGrWdwuXZ8ojaI5dtX2mIRuMS5bqaQw')"></div>
<div class="absolute inset-0 bg-gradient-to-t from-background/80 to-transparent"></div>
<div class="absolute bottom-xs left-md">
<span class="text-[10px] font-bold tracking-widest text-primary uppercase">Live Satellite Feed</span>
</div>
</div>
</main>
<!-- Fixed SOS Action Bar -->
<div class="fixed bottom-0 left-0 w-full p-md bg-background/60 backdrop-blur-xl border-t border-border-muted z-[60]">
<button class="sos-button-gradient w-full py-lg rounded-xl flex items-center justify-center gap-md emergency-glow transition-all duration-300 active:scale-95 group overflow-hidden relative" id="sos-trigger">
<div class="absolute inset-0 bg-white/10 translate-y-full group-active:translate-y-0 transition-transform duration-300"></div>
<span class="material-symbols-outlined text-white animate-pulse-warning text-[32px]" data-icon="warning" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="text-white font-display-lg text-[20px] uppercase tracking-widest font-extrabold">Send SOS</span>
</button>
</div>
<!-- Active Navigation (Hidden from SOS context as per "Semantic Shell" mandate but logic is here) -->
<!-- Navigation suppressed for high-focus transactional emergency screen -->
<script>
        // Micro-interaction for the SOS button
        const sosButton = document.getElementById('sos-trigger');
        let pressTimer;

        sosButton.addEventListener('mousedown', () => {
            sosButton.classList.add('scale-[0.98]');
        });

        sosButton.addEventListener('mouseup', () => {
            sosButton.classList.remove('scale-[0.98]');
        });

        // Prevention of accidental triggers could be added here (e.g., hold for 2 seconds)
        sosButton.addEventListener('click', () => {
            const confirmed = confirm("Are you sure you want to send a high-priority SOS alert? This action cannot be undone.");
            if (confirmed) {
                sosButton.innerHTML = `
                    <span class="material-symbols-outlined text-white animate-spin" data-icon="sync">sync</span>
                    <span class="text-white font-display-lg text-[20px] uppercase tracking-widest font-extrabold">Alerting Dispatch...</span>
                `;
                sosButton.classList.remove('sos-button-gradient');
                sosButton.classList.add('bg-on-tertiary-fixed-variant');
                
                setTimeout(() => {
                    alert("SOS Alert Dispatched. Help is on the way.");
                }, 1500);
            }
        });
    </script>
</body></html>
